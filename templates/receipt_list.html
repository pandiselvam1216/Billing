<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing - Orders</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8ecf1;
            text-align: center;
            margin: 0;
        }
        .top-navbar {
            background: #4169E1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            width: 120px;
        }
        .nav-logo img {
            height: 140px; /* Counteract large transparent margins in the PNG */
            transform: scale(1.2);
        }
        .nav-logo svg { width: 40px; height: 40px; }
        .nav-tabs-custom { display: flex; gap: 8px; flex: 1; justify-content: center; }
        .nav-tab {
            background: #fff; color: #333; border: none; padding: 8px 32px;
            border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-tab:hover { background: #e0e7ff; color: #333; text-decoration: none; }
        .nav-tab.active { background: #fff; color: #4169E1; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .nav-right label { color: #fff; font-size: 14px; font-weight: 500; white-space: nowrap; }
        .nav-right input { width: 100px; padding: 5px 10px; border: none; border-radius: 5px; font-size: 14px; }
        .container { margin-top: 20px; }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); padding: 20px; }
    </style>
</head>
<body>
    <div class="top-navbar">
        <div class="nav-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>
        <div class="nav-tabs-custom">
            <a href="/" class="nav-tab">POS</a>
            <a href="/items" class="nav-tab">Items</a>
            <a href="/receipts" class="nav-tab active">Orders</a>
            <a href="/" class="nav-tab">Report</a>
        </div>
        <div class="nav-right">
            <label>Seller Code:</label>
            <input type="text" id="sellerCode" placeholder="">
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <h4 class="text-center">All Orders</h4>
                    <div class="table-container">
                        <table class="table table-striped table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>Bill No</th>
                                    <th>Customer Name</th>
                                    <th>Mobile</th>
                                    <th>Total Amount</th>
                                    <th>Date</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="receiptsTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                        <div class="pagination d-flex justify-content-center mt-3">
                            <!-- Pagination hidden for local storage -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tbody = document.getElementById("receiptsTableBody");
            let receipts = JSON.parse(localStorage.getItem("receipts")) || [];
            
            // Sort receipts by timestamp descending
            receipts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (receipts.length === 0) {
                tbody.innerHTML = "<tr><td colspan='6'>No orders found.</td></tr>";
            } else {
                tbody.innerHTML = receipts.map(receipt => {
                    let d = new Date(receipt.timestamp);
                    let formattedDate = ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth() + 1)).slice(-2) + '/' + d.getFullYear();
                    return `
                    <tr>
                        <td>${receipt.id}</td>
                        <td>${receipt.customer_name}</td>
                        <td>${receipt.mobile}</td>
                        <td>${receipt.total}</td>
                        <td>${formattedDate}</td>
                        <td>
                            <a href="/bill/${receipt.id}" class="btn btn-primary btn-sm">View</a>
                        </td>
                    </tr>
                    `;
                }).join('');
            }
            
            const sellerCodeInput = document.getElementById("sellerCode");
            const stored = localStorage.getItem("sellerCode");
            if (stored) sellerCodeInput.value = stored;
            sellerCodeInput.addEventListener("input", function () {
                localStorage.setItem("sellerCode", this.value);
            });
        });
    </script>
</body>
</html>
