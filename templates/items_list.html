<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing - Items</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8ecf1;
            text-align: center;
            margin: 0;
        }
        .top-navbar {
            background: #4169E1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            width: 120px;
        }
        .nav-logo img {
            height: 140px; /* Counteract large transparent margins in the PNG */
            transform: scale(1.2);
        }
        .nav-logo svg { width: 40px; height: 40px; }
        .nav-tabs-custom { display: flex; gap: 8px; flex: 1; justify-content: center; }
        .nav-tab {
            background: #fff; color: #333; border: none; padding: 8px 32px;
            border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-tab:hover { background: #e0e7ff; color: #333; text-decoration: none; }
        .nav-tab.active { background: #fff; color: #4169E1; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .nav-right label { color: #fff; font-size: 14px; font-weight: 500; white-space: nowrap; }
        .nav-right input { width: 100px; padding: 5px 10px; border: none; border-radius: 5px; font-size: 14px; }
        .container { margin-top: 20px; }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); padding: 20px; }
    </style>
</head>
<body>
    <div class="top-navbar">
        <div class="nav-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>
        <div class="nav-tabs-custom">
            <a href="/" class="nav-tab">POS</a>
            <a href="/items" class="nav-tab active">Items</a>
            <a href="/receipts" class="nav-tab">Orders</a>
            <a href="/" class="nav-tab">Report</a>
        </div>
        <div class="nav-right">
            <label>Seller Code:</label>
            <input type="text" id="sellerCode" placeholder="">
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="text-center">Items</h4>
                        <a href="/add-item" class="btn btn-success btn-sm">+ Add Item</a>
                    </div>
                    <div class="table-container">
                        <table class="table table-striped table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>Item number</th>
                                    <th>Name</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in items %}
                                <tr>
                                    <td>{{ item.item_number }}</td>
                                    <td>{{ item.name }}</td>
                                    <td>
                                        <a href="/inventory/{{ item.id }}" class="btn btn-primary btn-sm">Inventory</a>
                                        <a href="/edit-item/{{ item.id }}" class="btn btn-primary btn-sm">Edit</a>
                                        <a href="javascript:void(0);" class="btn btn-danger btn-sm" onclick="confirmDelete({{ item.id }})">Delete</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                        <div class="pagination d-flex justify-content-center mt-3">
                            <nav>
                                <ul class="pagination">
                                    <li class="page-item {% if not items.has_prev %}disabled{% endif %}">
                                        <a class="page-link" href="{{ url_for('get_items', page=items.prev_num) }}">Previous</a>
                                    </li>
                                    <li class="page-item disabled">
                                        <span class="page-link">Page {{ items.page }} of {{ items.pages }}</span>
                                    </li>
                                    <li class="page-item {% if not items.has_next %}disabled{% endif %}">
                                        <a class="page-link" href="{{ url_for('get_items', page=items.next_num) }}">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Seller code persistence
        document.addEventListener("DOMContentLoaded", function () {
            const sellerCodeInput = document.getElementById("sellerCode");
            const stored = localStorage.getItem("sellerCode");
            if (stored) sellerCodeInput.value = stored;
            sellerCodeInput.addEventListener("input", function () {
                localStorage.setItem("sellerCode", this.value);
            });
        });

        function confirmDelete(itemId) {
            if (confirm("Are you sure you want to delete this item?")) {
                fetch(`/delete_item/${itemId}`, { method: "DELETE" })
                .then(response => response.json()).then(data => {
                    window.location.reload();
                })
                .catch(error => {
                    alert("Failed to delete item");
                });
            }
        }
    </script>
</body>
</html>
