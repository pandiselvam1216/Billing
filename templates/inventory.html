<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receipts</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: monospace;
            background-color: #f8f9fa;
            text-align: center;
        }
        .container {
            margin-top: 20px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .btn-custom {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand mx-auto" href="/">Billing</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="text-center">Inventory for</h4>
                        <a href="/add-item" class="btn btn-success btn-sm">+ Add Item</a>
                    </div>
                    <div class="table-container">
                        <table class="table table-striped table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>Item number</th>
                                    <th>Name</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="itemsTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                        <div class="pagination d-flex justify-content-center mt-3">
                            <!-- Pagination hidden for local storage -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tbody = document.getElementById("itemsTableBody");
            let items = JSON.parse(localStorage.getItem("items")) || [];
            
            if (items.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3'>No items found.</td></tr>";
            } else {
                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>${item.item_number}</td>
                        <td>${item.name}</td>
                        <td>
                            <a href="/edit-item/${item.id}" class="btn btn-primary btn-sm">Edit</a>
                            <a href="javascript:void(0);" class="btn btn-danger btn-sm" onclick="confirmDelete(${item.id})">Delete</a>
                        </td>
                    </tr>
                `).join('');
            }
        });

        function confirmDelete(itemId) {
            if (confirm("Are you sure you want to delete this item?")) {
                let items = JSON.parse(localStorage.getItem("items")) || [];
                items = items.filter(i => i.id != itemId);
                localStorage.setItem("items", JSON.stringify(items));
                window.location.reload();
            }
        }
    </script>
</body>
</html>
