<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 500px;
            margin-top: 40px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand mx-auto" href="/">Billing</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="card p-4">
            <h4 class="text-center">Manage Items</h4>

            <input type="hidden" id="itemId"> <!-- Hidden field for editing -->

            <div class="mb-3">
                <input type="text" id="itemName" class="form-control" placeholder="Enter Item Name">
            </div>
            <div class="mb-3">
                <input type="text" id="itemSuffix" class="form-control" placeholder="Enter Item Suffix">
            </div>

            <button id="saveItemBtn" class="btn btn-success w-100">Add Item</button>
            <button id="deleteItemBtn" class="btn btn-danger w-100 mt-2" style="display: none;">Delete Item</button>

            <h5 class="mt-4">Item List</h5>
            <ul id="itemList" class="list-group"></ul>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        async function loadItems() {
            const response = await fetch("/get_items");
            const items = await response.json();
            const itemList = document.getElementById("itemList");
            itemList.innerHTML = "";
            items.forEach(item => {
                console.log(item);

                const li = document.createElement("li");
                li.className = "item";
                li.dataset.id = item.id;
                li.dataset.name = item.name;
                li.innerHTML = `${item.name}`;
                li.addEventListener("click", function() { selectItem(item.id, item.name, item.suffix); });
                itemList.appendChild(li);
            });
        }

        function selectItem(id, name, suffix) {
            document.getElementById("itemId").value = id;
            document.getElementById("itemName").value = name;
            document.getElementById("itemSuffix").value = suffix;
            document.getElementById("saveItemBtn").textContent = "Update Item";
            document.getElementById("deleteItemBtn").style.display = "block";
        }

        document.getElementById("saveItemBtn").addEventListener("click", function() {
            const id = document.getElementById("itemId").value;
            const name = document.getElementById("itemName").value;
            const suffix = document.getElementById("itemSuffix").value;

            if (!name) {
                alert("Enter item name.");
                return;
            }

            const url = id ? `/edit_item/${id}` : "/add_item";
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 'name':name, 'suffix':suffix })
            }).then(response => response.json()).then(data => {
                alert(data.message);
                resetForm();
                loadItems();
            });
        });

        document.getElementById("deleteItemBtn").addEventListener("click", function() {
            const id = document.getElementById("itemId").value;
            if (!id) return;

            if (confirm("Are you sure you want to delete this item?")) {
                fetch(`/delete_item/${id}`, { method: "DELETE" })
                .then(response => response.json()).then(data => {
                    alert(data.message);
                    resetForm();
                    loadItems();
                });
            }
        });

        function resetForm() {
            document.getElementById("itemId").value = "";
            document.getElementById("itemName").value = "";
            document.getElementById("itemSuffix").value = "";
            document.getElementById("saveItemBtn").textContent = "Add Item";
            document.getElementById("deleteItemBtn").style.display = "none";
        }

        loadItems();
    </script>
</body>
</html>
