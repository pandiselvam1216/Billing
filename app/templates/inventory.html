<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receipts</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: monospace;
            background-color: #f8f9fa;
            text-align: center;
        }
        .container {
            margin-top: 20px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .btn-custom {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand mx-auto" href="/">Billing</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="text-center">Inventory for</h4>
                        <a href="/add-item" class="btn btn-success btn-sm">+ Add Item</a>
                    </div>
                    <div class="table-container">
                        <table class="table table-striped table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>Item number</th>
                                    <th>Name</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in items %}
                                <tr>
                                    <td>{{ item.item_number }}</td>
                                    <td>{{ item.name }}</td>
                                    <td>
                                        <a href="/view-inventory/{{ item.id }}" class="btn btn-primary btn-sm">Inventory</a>
                                        <a href="/edit-item/{{ item.id }}" class="btn btn-primary btn-sm">Edit</a>
                                        <!-- <a href="/receipt/{{ item.id }}" class="btn btn-danger btn-sm">Delete</a> -->
                                        <a href="javascript:void(0);" class="btn btn-danger btn-sm" onclick="confirmDelete({{ item.id }})">Delete</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                        <div class="pagination d-flex justify-content-center mt-3">
                            <nav>
                                <ul class="pagination">
                                    <li class="page-item {% if not items.has_prev %}disabled{% endif %}">
                                        <a class="page-link" href="{{ url_for('get_receipts', page=items.prev_num) }}">Previous</a>
                                    </li>
                                    <li class="page-item disabled">
                                        <span class="page-link">Page {{ items.page }} of {{ items.pages }}</span>
                                    </li>
                                    <li class="page-item {% if not items.has_next %}disabled{% endif %}">
                                        <a class="page-link" href="{{ url_for('get_receipts', page=items.next_num) }}">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function confirmDelete(itemId) {
            if (confirm("Are you sure you want to delete this item?")) {
                fetch(`/delete_item/${itemId}`, { method: "DELETE" })
                .then(response => response.json()).then(data => {
                    window.location.reload();
                })
                .catch(error => {
                    showError("dayReportError", "Error fetching data. Please check your connection.");
                    alert("Failed to delete item");
                });
            }
        }
    </script>
</body>
</html>
